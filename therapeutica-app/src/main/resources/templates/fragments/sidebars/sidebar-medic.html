<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Sidebar-ul preia fundalul cardurilor din secțiunea "Pași" (brand-navy) -->
<aside class="fixed left-0 top-0 h-full w-64 bg-brand-navy shadow-xl z-50 hidden md:block">

    <!-- Zona de profil -->
    <div class="p-6 border-b border-white/10">
        <div class="flex items-center space-x-3 mb-4">
            <!-- Container avatar cu accente brand-gold -->
            <div class="w-12 h-12 bg-brand-gold/10 rounded-xl flex items-center justify-center border border-brand-gold/30 shadow-sm">
                <i class="fas fa-user-md text-brand-gold text-2xl"></i>
            </div>
            <div>
                <!-- Titlul principal folosește brand-gold -->
                <h2 class="font-bold text-brand-gold text-lg uppercase tracking-wider">Medic</h2>
            </div>
        </div>
        <div class="mt-2">
            <!-- Textul numelui este alb pentru claritate -->
            <p class="text-sm text-white font-bold tracking-wide">
                <span th:text="${session.userNume != null} ? ${session.userNume} : 'Dr. Nume'"></span>
                <span th:text="${session.userPrenume != null} ? ${session.userPrenume} : 'Prenume'"></span>
            </p>
            <p class="text-xs text-white/60 font-medium mt-0.5" th:text="${session.userEmail}"></p>
        </div>
    </div>

    <!-- Meniul de navigare -->
    <nav class="p-4 space-y-2">

        <!-- Link-uri: Text alb estompat, iconițe brand-gold. La hover: fundal subtil și text alb complet -->
        <a th:href="@{'/medic/dashboard/' + ${session.userId}}"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-brand-gold/10 text-white/70 hover:text-white transition-all duration-200 group">
            <i class="fas fa-tachometer-alt w-5 text-center text-brand-gold/80 group-hover:text-brand-gold transition-colors"></i>
            <span class="font-medium tracking-wide">Dashboard Medic</span>
        </a>

        <a th:href="@{'/medic/profil/' + ${session.userId}}"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-brand-gold/10 text-white/70 hover:text-white transition-all duration-200 group">
            <i class="fas fa-user-circle w-5 text-center text-brand-gold/80 group-hover:text-brand-gold transition-colors"></i>
            <span class="font-medium tracking-wide">Profil</span>
        </a>

        <a th:href="@{'/medic/' + ${session.userId} + '/pacienti'}"
           class="flex items-center justify-between px-4 py-3 rounded-lg hover:bg-brand-gold/10 text-white/70 hover:text-white transition-all duration-200 group">
            <div class="flex items-center space-x-3">
                <i class="fas fa-users w-5 text-center text-brand-gold/80 group-hover:text-brand-gold transition-colors"></i>
                <span class="font-medium tracking-wide">Pacienții mei</span>
            </div>
        </a>

        <a th:href="@{'/medic/rapoarte/' + ${session.userId}}"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-brand-gold/10 text-white/70 hover:text-white transition-all duration-200 group">
            <i class="fas fa-chart-bar w-5 text-center text-brand-gold/80 group-hover:text-brand-gold transition-colors"></i>
            <span class="font-medium tracking-wide">Rapoarte</span>
        </a>

        <a th:href="@{/chestionare/medic/lista-chestionare}"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-brand-gold/10 text-white/70 hover:text-white transition-all duration-200 group">
            <i class="fas fa-list-alt w-5 text-center text-brand-gold/80 group-hover:text-brand-gold transition-colors"></i>
            <span class="font-medium tracking-wide">Chestionare</span>
        </a>

        <div class="border-t border-white/10 my-4"></div>

        <a th:href="@{'/medic/notificari/' + ${session.userId}}"
           class="flex items-center justify-between px-4 py-3 rounded-lg hover:bg-brand-gold/10 text-white/70 hover:text-white transition-all duration-200 group">
            <div class="flex items-center space-x-3">
                <i class="fas fa-bell w-5 text-center text-brand-gold/80 group-hover:text-brand-gold transition-colors"></i>
                <span class="font-medium tracking-wide">Notificări</span>
            </div>
            <div id="notif-wrapper" class="hidden items-center">
                <!-- Pentru contrast optim pe Navy, poți folosi un badge roșu aprins sau chiar Teal. Aici am folosit Teal pentru o consistență cu brandul. -->
                <span id="notif-count" class="bg-brand-teal text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md border border-brand-teal">
                    0
                </span>
            </div>
        </a>

        <form th:action="@{/api/auth/logout-web}" method="post" class="m-0 p-0 mt-2">
            <!-- Butonul de deconectare păstrează semantica de alertă la hover -->
            <button type="submit"
                    class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-rose-500/20 text-white/70 hover:text-rose-100 transition-all duration-200 text-left group">
                <i class="fas fa-sign-out-alt w-5 text-center text-white/40 group-hover:text-rose-400 transition-colors"></i>
                <span class="font-medium tracking-wide">Deconectare</span>
            </button>
        </form>
    </nav>
</aside>

<script th:inline="javascript">
    (function() {
        const userId = /*[[${session.userId}]]*/ null;

        function updateNotificationBadge() {
            if (!userId) return;

            fetch('/api/notificari/necitite-count/' + userId)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(count => {
                    const wrapper = document.getElementById('notif-wrapper');
                    const badge = document.getElementById('notif-count');

                    if (wrapper && badge) {
                        if (count > 0) {
                            badge.innerText = count > 9 ? '9+' : count;
                            wrapper.classList.remove('hidden');
                            wrapper.classList.add('flex');
                        } else {
                            wrapper.classList.add('hidden');
                            wrapper.classList.remove('flex');
                        }
                    }
                })
                .catch(err => console.error("Eroare la actualizarea badge-ului:", err));
        }

        document.addEventListener('DOMContentLoaded', updateNotificationBadge);
        setInterval(updateNotificationBadge, 30000);
    })();
</script>
</body>
</html>
