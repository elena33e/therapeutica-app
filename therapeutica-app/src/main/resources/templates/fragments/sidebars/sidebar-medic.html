<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="fixed left-0 top-0 h-full w-64 bg-gradient-to-b from-green-50 to-white border-r border-gray-200 shadow-lg z-50 hidden md:block">
    <div class="p-6 border-b border-gray-100 bg-white">
        <div class="flex items-center space-x-3 mb-4">
            <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">
                <i class="fas fa-user-md text-green-600 text-2xl"></i>
            </div>
            <div>
                <h2 class="font-bold text-gray-800">Medic</h2>
            </div>
        </div>
        <div class="mt-2">
            <p class="text-sm text-gray-600">
                <span th:text="${session.userNume != null} ? ${session.userNume} : 'Dr. Nume'"></span>
                <span th:text="${session.userPrenume != null} ? ${session.userPrenume} : 'Prenume'"></span>
            </p>
            <p class="text-xs text-gray-500" th:text="${session.userEmail}"></p>
        </div>
    </div>

    <nav class="p-4 space-y-1">
        <a th:href="@{'/medic/dashboard/' + ${session.userId}}"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-green-100 text-gray-700 hover:text-green-700 transition duration-200">
            <i class="fas fa-tachometer-alt w-5 text-center"></i>
            <span>Dashboard Medic</span>
        </a>

        <a th:href="@{'/medic/profil/' + ${session.userId}}"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-blue-100 text-gray-700 hover:text-blue-700 transition duration-200">
            <i class="fas fa-user-circle w-5 text-center"></i>
            <span>Profil</span>
        </a>

        <a th:href="@{'/medic/' + ${session.userId} + '/pacienti'}"
           class="flex items-center justify-between px-4 py-3 rounded-lg hover:bg-blue-100 text-gray-700 hover:text-blue-700 transition duration-200 group">
            <div class="flex items-center space-x-3">
                <i class="fas fa-users w-5 text-center"></i>
                <span>Pacienții mei</span>
            </div>
        </a>

        <a th:href="@{'/medic/rapoarte/' + ${session.userId}}"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-teal-100 text-gray-700 hover:text-teal-700 transition duration-200">
            <i class="fas fa-chart-bar w-5 text-center"></i>
            <span>Rapoarte</span>
        </a>

        <a th:href="@{/chestionare/medic/lista-chestionare}"
           class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-600 transition">
            <i class="fas fa-list-alt w-5 text-center"></i>
            <span>Chestionare</span>
        </a>

        <div class="border-t border-gray-200 my-2"></div>

        <a th:href="@{'/medic/notificari/' + ${session.userId}}"
           class="flex items-center justify-between px-4 py-3 rounded-lg hover:bg-amber-50 text-gray-700 hover:text-amber-700 transition duration-200 group">
            <div class="flex items-center space-x-3">
                <i class="fas fa-bell w-5 text-center"></i>
                <span>Notificări</span>
            </div>
            <div id="notif-wrapper" class="hidden items-center">
                <span id="notif-count" class="bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm">
                    0
                </span>
            </div>
        </a>

        <form th:action="@{/api/auth/logout-web}" method="post" class="m-0 p-0">
            <button type="submit"
                    class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-red-50 text-gray-700 hover:text-red-600 transition duration-200 mt-2 text-left">
                <i class="fas fa-sign-out-alt w-5 text-center"></i>
                <span>Deconectare</span>
            </button>
        </form>
    </nav>
</aside>

<script th:inline="javascript">
    (function() {
        // Preluăm ID-ul din sesiune folosind inlining-ul securizat de la Thymeleaf
        const userId = /*[[${session.userId}]]*/ null;

        function updateNotificationBadge() {
            if (!userId) return;

            // Folosim endpoint-ul optimizat de COUNT
            fetch('/api/notificari/necitite-count/' + userId)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(count => {
                    const wrapper = document.getElementById('notif-wrapper');
                    const badge = document.getElementById('notif-count');

                    if (wrapper && badge) {
                        if (count > 0) {
                            badge.innerText = count > 9 ? '9+' : count;
                            wrapper.classList.remove('hidden');
                            wrapper.classList.add('flex');
                        } else {
                            wrapper.classList.add('hidden');
                            wrapper.classList.remove('flex');
                        }
                    }
                })
                .catch(err => console.error("Eroare la actualizarea badge-ului:", err));
        }

        // Prima rulare la încărcarea paginii
        document.addEventListener('DOMContentLoaded', updateNotificationBadge);

        // Verificare periodică la fiecare 30 secunde
        setInterval(updateNotificationBadge, 30000);
    })();
</script>
</body>
</html>
