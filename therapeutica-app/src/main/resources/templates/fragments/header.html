<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="header">
    <header class="bg-white shadow-sm border-b border-gray-200" th:unless="${session != null and session.userId != null}">

        <nav class="container mx-auto px-4 py-4 max-w-7xl">
            <div class="flex justify-between items-center">

                <!-- Logo -->
                <div class="flex items-center space-x-3">
                    <div class="bg-brand-teal/10 p-2 rounded-lg border border-brand-teal/20">
                        <svg class="w-6 h-6 text-brand-teal" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-black text-brand-navy tracking-tight">Therapeutica</span>
                </div>

                <!-- Navigation Links -->
                <div class="flex items-center space-x-6">
                    <a th:href="@{/}" class="text-sm font-bold text-gray-500 hover:text-brand-navy uppercase tracking-widest transition-colors">
                        Acasă
                    </a>

                    <!-- Butoane autentificare -->
                    <div class="flex items-center space-x-3 border-l border-gray-200 pl-6">
                        <!-- Acțiune Secundară -->
                        <a th:href="@{/login}"
                           class="text-brand-navy font-bold py-2 px-5 rounded-xl border border-gray-200 hover:bg-gray-50 hover:shadow-sm transition-all text-sm">
                            Autentificare
                        </a>
                        <!-- Acțiune Principală -->
                        <a th:href="@{/inregistrare}"
                           class="bg-brand-teal hover:bg-brand-teal/90 text-white font-bold py-2 px-5 rounded-xl shadow-sm hover:shadow-md transition-all text-sm">
                            Înregistrare
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
</div>
</body>
</html>
