<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Notificările Mele | Therapeutica</title>
</head>
<body class="bg-gray-50">

<div layout:fragment="content" class="container mx-auto px-4 py-12 max-w-7xl">

    <!-- Header -->
    <div class="mb-10 flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-bold text-brand-navy flex items-center">
                <i class="fas fa-bell text-brand-gold mr-3"></i>Notificări
            </h1>
            <p class="text-gray-500 font-medium mt-2">Urmărește recomandările și noutățile trimise de medicul tău.</p>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(notificari)}" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-12 text-center max-w-4xl">
        <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-5 border border-gray-200 shadow-sm">
            <i class="fas fa-envelope-open text-3xl text-brand-blue"></i>
        </div>
        <h3 class="text-xl font-bold text-brand-navy mb-1">Inbox-ul este gol</h3>
        <p class="text-gray-500 font-medium text-sm">Te vom anunța imediat ce medicul tău îți trimite informații noi.</p>
    </div>

    <!-- Lista Notificări -->
    <div th:unless="${#lists.isEmpty(notificari)}" class="space-y-4 max-w-4xl">

        <div th:each="notif : ${notificari}"
             class="relative bg-white rounded-2xl shadow-sm border p-5 md:p-6 flex flex-col md:flex-row md:items-center justify-between transition-all hover:shadow-md"
             th:classappend="${!notif.citita} ? 'border-brand-teal border-l-4 bg-gray-50/50' : 'border-gray-200'">

            <div class="flex items-start space-x-4">

                <!-- Iconiță dinamică pe fundal solid -->
                <div class="mt-1 flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center shadow-sm border border-gray-100"
                     th:classappend="${notif.titlu.contains('Chestionar')} ? 'bg-brand-gold' : (${notif.titlu.contains('Analiză') or notif.titlu.contains('Rezultate')} ? 'bg-brand-blue' : 'bg-brand-navy')">
                    <i th:if="${notif.titlu.contains('Chestionar')}" class="fas fa-tasks text-brand-navy"></i>
                    <i th:if="${notif.titlu.contains('Analiză') or notif.titlu.contains('Rezultate')}" class="fas fa-file-medical-alt text-white"></i>
                    <i th:unless="${notif.titlu.contains('Chestionar') or notif.titlu.contains('Analiză') or notif.titlu.contains('Rezultate')}" class="fas fa-info-circle text-white"></i>
                </div>

                <div>
                    <h4 class="font-bold text-brand-navy text-lg flex items-center flex-wrap gap-2">
                        <span th:text="${notif.titlu}">Titlu Notificare</span>
                        <!-- Badge Nou (Teal Solid) -->
                        <span th:if="${!notif.citita}" class="px-2 py-0.5 text-[10px] uppercase font-bold tracking-wider text-white bg-brand-teal rounded-full shadow-sm">Nou</span>
                    </h4>
                    <p class="text-gray-600 font-medium mt-1.5 text-sm" th:text="${notif.mesaj}">Aici apare mesajul detaliat.</p>

                    <div class="flex items-center text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-3">
                        <i class="far fa-clock mr-1.5 text-brand-blue"></i>
                        <span th:text="${#temporals.format(notif.dataCreare, 'dd MMMM yyyy, HH:mm')}">Data</span>
                    </div>
                </div>
            </div>

            <div class="mt-5 md:mt-0 ml-14 md:ml-0 flex-shrink-0">
                <a th:href="@{'/api/notificari/acceseaza/' + ${notif.id}}"
                   class="inline-flex items-center justify-center px-6 py-3 bg-gray-50 border border-gray-200 rounded-xl text-[10px] font-bold uppercase tracking-widest text-brand-navy hover:bg-brand-navy hover:text-white transition-all shadow-sm group">
                    <span>Vezi Detalii</span>
                    <i class="fas fa-arrow-right ml-2 text-[10px] group-hover:translate-x-1 transition-transform"></i>
                </a>
            </div>
        </div>

    </div>
</div>

<div layout:fragment="scripts">
</div>

</body>
</html>
