<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Validare Analize Medicale</title>
</head>
<body class="bg-gray-50">

<div layout:fragment="content">
    <div class="container mx-auto px-4 py-12 max-w-7xl">

        <!-- Header -->
        <div class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold text-brand-navy mb-2">Validare Date Extrase</h1>
                <p class="text-gray-500 font-medium">Verifică și corectează datele identificate din document înainte de salvarea în dosar.</p>
            </div>
            <a th:href="@{/analize/pacient/documente/{id}(id=${pacientId})}"
               class="inline-flex items-center text-sm font-bold text-gray-500 hover:text-brand-navy transition-colors px-4 py-2 bg-white border border-gray-200 rounded-lg shadow-sm">
                <i class="fas fa-arrow-left mr-2"></i> Anulează revizuirea
            </a>
        </div>

        <form id="validareForm" th:action="@{/analize/salveaza-validat}" th:object="${buletin}" method="post" class="space-y-8">
            <input type="hidden" th:field="*{documentId}" />
            <input type="hidden" th:field="*{pacientId}" />
            <input type="hidden" th:field="*{pacientEntityId}" />

            <!-- Tabel Secțiuni -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left">
                        <thead class="bg-gray-100 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4 text-[10px] font-bold text-brand-navy uppercase tracking-widest w-1/4">Indicator</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-brand-navy uppercase tracking-widest w-1/5">Metodă Detectată</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-brand-navy uppercase tracking-widest w-1/6 text-center">Valoare</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-brand-navy uppercase tracking-widest w-1/8 text-center">U.M.</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-brand-navy uppercase tracking-widest w-1/5">Interval Referință</th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">

                        <th:block th:each="sec, secStat : *{sectiuni}">

                            <!-- Header Secțiune -->
                            <tr class="bg-gray-50 section-row border-y border-gray-200" th:data-section-index="${secStat.index}">
                                <td colspan="5" class="px-6 py-4">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-3 w-1/2">
                                            <div class="bg-white p-2 rounded-lg border border-gray-200 shadow-sm flex-shrink-0">
                                                <i class="fas fa-microscope text-brand-blue"></i>
                                            </div>
                                            <input type="text"
                                                   class="w-full text-sm font-bold text-brand-navy uppercase tracking-wide bg-transparent border-b-2 border-dashed border-gray-300 focus:border-brand-teal outline-none py-1 transition-colors"
                                                   th:field="*{sectiuni[__${secStat.index}__].nume}" />
                                        </div>
                                        <div class="flex gap-3">
                                            <button type="button" onclick="addIndicator(this)" class="inline-flex items-center text-[10px] font-bold uppercase tracking-widest bg-white border border-gray-200 text-brand-teal px-3 py-2 rounded-lg hover:bg-brand-teal/5 transition-colors shadow-sm outline-none">
                                                <i class="fas fa-plus mr-1.5 text-brand-teal"></i> Adaugă Rând
                                            </button>
                                            <button type="button" onclick="removeSection(this)" class="inline-flex items-center text-[10px] font-bold uppercase tracking-widest bg-red-50 text-red-600 px-3 py-2 rounded-lg border border-red-100 hover:bg-red-100 transition-colors shadow-sm outline-none">
                                                <i class="fas fa-trash-alt mr-1.5"></i> Șterge Secțiunea
                                            </button>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <!-- Flag soft-delete pentru întreaga secțiune -->
                            <input type="hidden" class="section-sters-flag"
                                   th:field="*{sectiuni[__${secStat.index}__].sters}" value="false" />

                            <!-- Indicatori -->
                            <tr th:each="ind, indStat : ${sec.indicatori}" class="hover:bg-gray-50 transition-colors indicator-row">
                                <td class="px-6 py-3">
                                    <input type="text" class="w-full bg-transparent border-b border-transparent focus:border-brand-teal outline-none py-1.5 text-sm font-bold text-brand-navy transition-colors"
                                           th:field="*{sectiuni[__${secStat.index}__].indicatori[__${indStat.index}__].nume}" />
                                </td>

                                <td class="px-6 py-3">
                                    <input type="text" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-[10px] uppercase tracking-widest font-bold text-gray-500 focus:bg-white focus:border-brand-blue focus:ring-1 focus:ring-brand-blue outline-none transition-all"
                                           placeholder="Ex: Spectrometrie"
                                           th:field="*{sectiuni[__${secStat.index}__].indicatori[__${indStat.index}__].metoda_detectata}" />
                                </td>

                                <td class="px-6 py-3">
                                    <input type="text" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm font-black text-brand-navy text-center shadow-sm focus:border-brand-teal focus:ring-1 focus:ring-brand-teal outline-none transition-all"
                                           th:field="*{sectiuni[__${secStat.index}__].indicatori[__${indStat.index}__].valoare}" />
                                </td>

                                <td class="px-6 py-3">
                                    <input type="text" class="w-full bg-transparent border-b border-transparent focus:border-brand-teal outline-none py-1.5 text-sm font-medium text-gray-600 text-center transition-colors"
                                           th:field="*{sectiuni[__${secStat.index}__].indicatori[__${indStat.index}__].um}" />
                                </td>

                                <td class="px-6 py-3 flex items-center justify-between gap-2">
                                    <input type="text" class="w-full bg-transparent border-b border-transparent focus:border-brand-teal outline-none py-1.5 text-sm font-medium text-gray-600 transition-colors"
                                           th:field="*{sectiuni[__${secStat.index}__].indicatori[__${indStat.index}__].interval}" />
                                    <!-- Flag soft-delete pentru acest indicator -->
                                    <input type="hidden" class="indicator-sters-flag"
                                           th:field="*{sectiuni[__${secStat.index}__].indicatori[__${indStat.index}__].sters}" value="false" />
                                    <button type="button" onclick="removeRow(this)" class="text-gray-300 hover:text-red-500 p-2 outline-none transition-colors" title="Șterge indicator">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </td>
                            </tr>
                        </th:block>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Footer Acțiuni -->
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 bg-white p-6 rounded-2xl border border-gray-200 shadow-sm mt-8">
                <div class="flex items-center text-sm font-medium text-gray-500 bg-gray-50 py-2 px-4 rounded-xl border border-gray-100">
                    <i class="fas fa-info-circle mr-2 text-brand-blue"></i>
                    Corectitudinea datelor asigură precizia mapării LOINC.
                </div>
                <button type="submit" id="submitBtn"
                        class="w-full sm:w-auto bg-brand-teal hover:bg-brand-teal/90 text-white font-bold py-3.5 px-8 rounded-xl shadow-md transition-all flex items-center justify-center uppercase tracking-widest text-xs active:scale-95 group disabled:opacity-60 disabled:cursor-not-allowed">
                    <i class="fas fa-save mr-2 text-white group-hover:scale-110 transition-transform"></i>
                    Salvează în Dosar
                </button>
            </div>

        </form>
    </div>
</div>

<div layout:fragment="scripts">
    <script>
        // Soft-delete: ascunde rândul și marchează hidden input-ul 'sters' ca true,


        function removeRow(button) {
            if (!confirm('Sigur vrei să ștergi acest indicator?')) return;

            const row = button.closest('tr.indicator-row');
            const flag = row.querySelector('.indicator-sters-flag');
            if (flag) {
                flag.value = 'true';
            }
            row.style.display = 'none';
        }

        function removeSection(button) {
            if (!confirm('Sigur vrei să ștergi TOATĂ secțiunea?')) return;

            const sectionHeader = button.closest('tr.section-row');

            // Bifează flag-ul secțiunii (e pe rândul imediat următor headerului)
            const sectionFlagRow = sectionHeader.nextElementSibling;
            if (sectionFlagRow) {
                const sectionFlag = sectionFlagRow.querySelector('.section-sters-flag')
                    || (sectionFlagRow.matches('input.section-sters-flag') ? sectionFlagRow : null);
                if (sectionFlag) sectionFlag.value = 'true';
            }

            sectionHeader.style.display = 'none';
            if (sectionFlagRow) sectionFlagRow.style.display = 'none';

            // Ascunde și marchează ca șterși toți indicatorii secțiunii
            let next = sectionFlagRow ? sectionFlagRow.nextElementSibling : sectionHeader.nextElementSibling;
            while (next && next.classList && next.classList.contains('indicator-row')) {
                const flag = next.querySelector('.indicator-sters-flag');
                if (flag) flag.value = 'true';
                next.style.display = 'none';
                next = next.nextElementSibling;
            }
        }

        function addIndicator(button) {
            const sectionRow = button.closest('tr.section-row');
            const sectionIndex = sectionRow.getAttribute('data-section-index');

            // Găsim ultimul rând de indicator din secțiune (sărim peste hidden-ul de flag al secțiunii)
            let lastRow = sectionRow.nextElementSibling; // poate fi flag-ul secțiunii
            if (lastRow && lastRow.matches('input.section-sters-flag')) {
                lastRow = lastRow.nextElementSibling;
            }
            let cursor = lastRow;
            let countIndicatori = 0;
            while (cursor && cursor.nextElementSibling && cursor.nextElementSibling.classList &&
                   cursor.nextElementSibling.classList.contains('indicator-row')) {
                cursor = cursor.nextElementSibling;
                countIndicatori++;
            }
            if (!cursor || !cursor.classList || !cursor.classList.contains('indicator-row')) {
                cursor = sectionRow;
            } else {
                countIndicatori++; // numărăm și ultimul rând găsit
            }

            // IMPORTANT: indexul trebuie să fie un întreg mic și continuu (numărul curent
            // de indicatori din secțiune), NU un timestamp - Spring's data binder alocă
            // o listă de mărimea indexului maxim întâlnit, deci un index uriaș ar crea
            // o listă internă cu milioane de elemente goale la binding.
            const newIndex = countIndicatori;

            const newRow = document.createElement('tr');
            newRow.className = 'hover:bg-gray-50 transition-colors indicator-row border-t border-gray-50';

            newRow.innerHTML = `
                <td class="px-6 py-3">
                    <input type="text" class="w-full bg-transparent border-b border-transparent focus:border-brand-teal outline-none py-1.5 text-sm font-bold text-brand-navy transition-colors"
                           name="sectiuni[${sectionIndex}].indicatori[${newIndex}].nume" value="Nume Indicator">
                </td>
                <td class="px-6 py-3">
                    <input type="text" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-[10px] uppercase tracking-widest font-bold text-gray-500 focus:bg-white focus:border-brand-blue focus:ring-1 focus:ring-brand-blue outline-none transition-all"
                           name="sectiuni[${sectionIndex}].indicatori[${newIndex}].metoda_detectata" placeholder="Ex: Spectrometrie">
                </td>
                <td class="px-6 py-3">
                    <input type="text" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm font-black text-brand-navy text-center shadow-sm focus:border-brand-teal focus:ring-1 focus:ring-brand-teal outline-none transition-all"
                           name="sectiuni[${sectionIndex}].indicatori[${newIndex}].valoare" value="">
                </td>
                <td class="px-6 py-3">
                    <input type="text" class="w-full bg-transparent border-b border-transparent focus:border-brand-teal outline-none py-1.5 text-sm font-medium text-gray-600 text-center transition-colors"
                           name="sectiuni[${sectionIndex}].indicatori[${newIndex}].um" value="">
                </td>
                <td class="px-6 py-3 flex items-center justify-between gap-2">
                    <input type="text" class="w-full bg-transparent border-b border-transparent focus:border-brand-teal outline-none py-1.5 text-sm font-medium text-gray-600 transition-colors"
                           name="sectiuni[${sectionIndex}].indicatori[${newIndex}].interval" value="">
                    <input type="hidden" class="indicator-sters-flag"
                           name="sectiuni[${sectionIndex}].indicatori[${newIndex}].sters" value="false">
                    <button type="button" onclick="removeRow(this)" class="text-gray-300 hover:text-red-500 p-2 outline-none transition-colors" title="Șterge indicator">
                        <i class="fas fa-times"></i>
                    </button>
                </td>
            `;

            cursor.after(newRow);
        }

        // Dezactivează butonul și afișează spinner la submit, ca să previi
        // dublu-click-ul (submit dublu) și să oferi feedback vizual cât timp
        // datele sunt trimise/procesate pe server.
        const validareForm = document.getElementById('validareForm');
        if (validareForm) {
            validareForm.addEventListener('submit', function () {
                const btn = document.getElementById('submitBtn');
                if (btn) {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> SE SALVEAZĂ...';
                }
            });
        }
    </script>
</div>

</body>
</html>
