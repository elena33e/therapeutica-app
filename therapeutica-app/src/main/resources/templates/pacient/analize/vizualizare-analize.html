<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Vizualizare Analize | Therapeutica</title>
</head>
<body class="bg-gray-50">

<div layout:fragment="content" class="container mx-auto px-4 py-12 max-w-7xl">

    <!-- Card Header -->
    <div class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200">
        <div>
            <!-- Breadcrumbs -->
            <nav class="flex mb-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                <a th:href="@{/analize/pacient/documente/{id}(id=${pacientId})}" class="hover:text-brand-navy transition-colors">Dosar Medical</a>
                <span class="mx-2 text-gray-300">/</span>
                <span class="text-brand-teal">Vizualizare Buletin</span>
            </nav>
            <h1 class="text-2xl md:text-3xl font-bold text-brand-navy">Rezultate Analize Medicale</h1>
        </div>

        <!-- Acțiuni -->
        <div class="flex items-center gap-3 w-full md:w-auto">
            <a th:href="@{/analize/valideaza/{id}(id=${buletin.documentId})}"
               class="flex-1 md:flex-none text-center bg-brand-gold hover:bg-brand-gold/90 text-brand-navy px-6 py-3 rounded-xl font-bold shadow-sm transition-all flex items-center justify-center text-sm">
                <i class="fas fa-edit mr-2"></i> Editează / Corectează
            </a>
            <button onclick="window.print()" class="bg-white border border-gray-200 hover:bg-gray-50 text-brand-navy px-5 py-3 rounded-xl transition-all shadow-sm flex items-center justify-center outline-none">
                <i class="fas fa-print"></i>
            </button>
        </div>
    </div>

    <!-- Tabel Analize -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mb-12">
        <div class="overflow-x-auto">
            <table class="min-w-full table-fixed text-left">
                <thead class="bg-gray-100 border-b border-gray-200">
                <tr>
                    <th class="w-2/5 px-8 py-4 text-[10px] font-bold text-brand-navy uppercase tracking-widest">Analiză / Metodă</th>
                    <th class="w-1/5 px-8 py-4 text-center text-[10px] font-bold text-brand-navy uppercase tracking-widest">Rezultat</th>
                    <th class="w-1/10 px-8 py-4 text-[10px] font-bold text-brand-navy uppercase tracking-widest">U.M.</th>
                    <th class="w-3/10 px-8 py-4 text-[10px] font-bold text-brand-navy uppercase tracking-widest">Interval Referință</th>
                </tr>
                </thead>

                <tbody class="divide-y divide-gray-100 bg-white">
                <th:block th:each="sectiune : ${buletin.sectiuni}">

                    <!-- Header Secțiune -->
                    <tr class="bg-gray-50 border-y border-gray-200">
                        <td colspan="4" class="px-8 py-4">
                            <h2 class="text-[11px] font-bold text-brand-navy uppercase tracking-widest flex items-center">
                                <div class="bg-white p-2 rounded-lg border border-gray-200 shadow-sm mr-3 flex-shrink-0">
                                    <i class="fas fa-microscope text-brand-blue text-sm"></i>
                                </div>
                                <span th:text="${sectiune.nume}">NUME SECȚIUNE</span>
                            </h2>
                        </td>
                    </tr>

                    <!-- Rânduri Indicatori -->
                    <tr th:each="ind : ${sectiune.indicatori}" class="hover:bg-gray-50 transition-colors">
                        <td class="px-8 py-4">
                            <span class="text-sm font-bold text-brand-navy block leading-snug" th:text="${ind.nume}">Analiză</span>
                            <span th:if="${ind.metoda_detectata != null and !ind.metoda_detectata.isEmpty()}"
                                  class="text-[10px] text-brand-blue font-bold uppercase tracking-widest mt-1.5 flex items-center">
                                <i class="fas fa-vial mr-1.5 text-[10px]"></i>
                                <span th:text="${ind.metoda_detectata}">Metodă nespecificată</span>
                            </span>
                        </td>
                        <td class="px-8 py-4 text-center">
                            <!-- Evidențiere valoare (Casă solidă) -->
                            <span class="text-sm font-black text-brand-navy bg-white border border-gray-200 px-4 py-1.5 rounded-lg shadow-sm inline-block" th:text="${ind.valoare}">-</span>
                        </td>
                        <td class="px-8 py-4 text-gray-600 text-sm font-medium" th:text="${ind.um}">-</td>
                        <td class="px-8 py-4 text-sm text-gray-500 font-medium" th:text="${ind.interval}">-</td>
                    </tr>
                </th:block>

                <!-- Empty State Integrat -->
                <tr th:if="${#lists.isEmpty(buletin.sectiuni)}">
                    <td colspan="4" class="px-8 py-24 text-center bg-gray-50">
                        <div class="mx-auto w-16 h-16 mb-4 bg-white rounded-full flex items-center justify-center border border-gray-200 shadow-sm">
                            <i class="fas fa-file-medical-alt text-2xl text-gray-300"></i>
                        </div>
                        <h3 class="text-lg font-bold text-brand-navy mb-1">Nu s-au găsit date</h3>
                        <p class="text-gray-500 font-medium text-sm">Nu au fost extrase date structurate din acest document.</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
