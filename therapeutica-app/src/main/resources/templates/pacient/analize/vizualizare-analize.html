<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Vizualizare Analize</title>
</head>
<body>

<div layout:fragment="content">
    <div class="container mx-auto px-4 py-8 max-w-5xl">

        <div class="mb-8 flex justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div>
                <nav class="flex mb-2 text-sm text-gray-500">
                    <a th:href="@{/analize/pacient/documente/{id}(id=${pacientId})}" class="hover:text-blue-600">Dosar Medical</a>
                    <span class="mx-2">/</span>
                    <span class="text-gray-800 font-medium">Vizualizare Buletin</span>
                </nav>
                <h1 class="text-3xl font-bold text-gray-800">Rezultate Analize Medicale</h1>
            </div>

            <div class="flex gap-4">
                <a th:href="@{/analize/valideaza/{id}(id=${buletin.documentId})}"
                   class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-lg font-bold shadow-sm transition-all flex items-center">
                    <i class="fas fa-edit mr-2"></i> Editează / Corectează
                </a>
                <button onclick="window.print()" class="bg-gray-800 hover:bg-black text-white px-4 py-2 rounded-lg transition-all">
                    <i class="fas fa-print"></i>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden mb-12">
            <table class="min-w-full table-fixed divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th class="w-2/5 px-8 py-4 text-left text-xs font-bold text-gray-400 uppercase tracking-widest">Analiză / Metodă</th>
                    <th class="w-1/5 px-8 py-4 text-center text-xs font-bold text-gray-400 uppercase tracking-widest">Rezultat</th>
                    <th class="w-1/10 px-8 py-4 text-left text-xs font-bold text-gray-400 uppercase tracking-widest">U.M.</th>
                    <th class="w-3/10 px-8 py-4 text-left text-xs font-bold text-gray-400 uppercase tracking-widest">Interval Referință</th>
                </tr>
                </thead>

                <tbody class="divide-y divide-gray-100 bg-white">
                <!-- Modificat 'entry' în 'sectiune', deoarece acum iterăm printr-o listă de SectiuneWrapperDTO -->
                <th:block th:each="sectiune : ${buletin.sectiuni}">
                    <tr class="bg-blue-50/70">
                        <td colspan="4" class="px-8 py-4 border-y border-blue-100">
                            <h2 class="text-sm font-black text-blue-900 uppercase tracking-wider flex items-center">
                                <i class="fas fa-microscope mr-3 text-blue-600"></i>
                                <!-- Aici se accesează direct .nume, nu .key -->
                                <span th:text="${sectiune.nume}">NUME SECȚIUNE</span>
                            </h2>
                        </td>
                    </tr>

                    <!-- Aici se accesează direct .indicatori, nu .value.indicatori -->
                    <tr th:each="ind : ${sectiune.indicatori}" class="hover:bg-gray-50/80 transition-colors">
                        <td class="px-8 py-3">
                            <span class="text-sm font-semibold text-gray-800 block" th:text="${ind.nume}">Analiză</span>
                            <span th:if="${ind.metoda_detectata != null and !ind.metoda_detectata.isEmpty()}"
                                  class="text-[10px] text-gray-400 italic block mt-0.5">
                                <i class="fas fa-flask mr-1 text-[9px]"></i>
                                <span th:text="${ind.metoda_detectata}">Metodă nespecificată</span>
                            </span>
                        </td>
                        <td class="px-8 py-3 text-center">
                            <span class="text-base font-bold text-blue-700" th:text="${ind.valoare}">-</span>
                        </td>
                        <td class="px-8 py-3 text-gray-500 text-xs font-medium" th:text="${ind.um}">-</td>
                        <td class="px-8 py-3 text-xs text-gray-400 italic" th:text="${ind.interval}">-</td>
                    </tr>
                </th:block>

                <!-- Modificat din #maps.isEmpty în #lists.isEmpty -->
                <tr th:if="${#lists.isEmpty(buletin.sectiuni)}">
                    <td colspan="4" class="p-20 text-center">
                        <i class="fas fa-file-medical-alt text-6xl text-gray-200 mb-4 block"></i>
                        <p class="text-gray-400 font-medium">Nu au fost găsite date în acest document.</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

</body>
</html>
