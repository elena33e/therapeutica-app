<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Istoric Diagnostice | Therapeutica</title>
</head>
<body class="bg-gray-50">
<div layout:fragment="content" class="container mx-auto px-4 py-12 max-w-7xl">

    <!-- Header Secțiune (Stil Dosar Medical) -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-brand-navy tracking-tight">Istoric Diagnostice</h1>
            <p class="text-gray-500 font-medium mt-2">Vizualizează evaluările și recomandările clinice stabilite de medicul tău.</p>
        </div>
    </div>

    <!-- Mesaje Erori -->
    <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 px-5 py-4 rounded-xl mb-8 shadow-sm flex items-center font-bold text-sm">
        <i class="fas fa-exclamation-triangle mr-3 text-red-500 text-xl"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- Container Timeline -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

        <div th:if="${not #lists.isEmpty(istoricDiagnostice)}" class="space-y-8">
            <div th:each="diag : ${istoricDiagnostice}" class="relative pl-8 sm:pl-10">

                <!-- Linia verticală -->
                <div class="absolute left-[11px] top-2 bottom-[-32px] w-0.5 bg-gray-200 last:hidden"></div>
                <!-- Punctul de bifare -->
                <div class="absolute left-0 top-1 w-6 h-6 rounded-full bg-brand-teal text-white flex items-center justify-center ring-4 ring-white shadow-sm">
                    <i class="fas fa-check text-[10px]"></i>
                </div>

                <!-- Card Diagnostic -->
                <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100 hover:border-brand-teal/30 transition-all">
                    <div class="flex flex-col sm:flex-row justify-between sm:items-start gap-4 mb-4">
                        <div>
                            <span class="inline-block px-3 py-1 bg-white text-gray-500 text-[10px] font-bold uppercase tracking-widest rounded-lg mb-2 shadow-sm border border-gray-100"
                                  th:text="${#temporals.format(diag.dataStabilire, 'dd MMMM yyyy · HH:mm')}">Data</span>
                            <h3 class="text-xl font-black text-brand-navy leading-tight" th:text="${diag.diagnosticFinal}">Diagnostic</h3>
                        </div>
                        <div class="flex items-center text-xs font-bold text-brand-navy bg-white px-4 py-2 rounded-xl border border-gray-200 shadow-sm">
                            <i class="fas fa-user-md text-brand-teal mr-2"></i>
                            <span th:text="'Dr. ' + ${diag.pacient.medic.user.nume} + ' ' + ${diag.pacient.medic.user.prenume}">Medic</span>
                        </div>
                    </div>

                    <!-- Observații -->
                    <div th:if="${diag.observatiiClinice != null and !diag.observatiiClinice.isEmpty()}" class="mt-4 pt-4 border-t border-gray-200">
                        <p class="text-[10px] font-bold text-brand-blue uppercase tracking-widest mb-2"><i class="fas fa-clipboard-check mr-1"></i> Observații</p>
                        <p class="text-sm text-gray-600 leading-relaxed font-medium bg-white p-4 rounded-xl border border-gray-100" th:text="${diag.observatiiClinice}"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(istoricDiagnostice)}" class="text-center py-20">
            <div class="w-20 h-20 bg-gray-50 border border-gray-200 rounded-full flex items-center justify-center mx-auto mb-5">
                <i class="fas fa-notes-medical text-brand-teal text-3xl"></i>
            </div>
            <p class="text-brand-navy font-bold text-lg mb-1">Dosar gol</p>
            <p class="text-gray-500 font-medium text-sm">Nu există diagnostice validate în istoricul tău medical.</p>
        </div>

    </div>

</div>
</body>
</html>
