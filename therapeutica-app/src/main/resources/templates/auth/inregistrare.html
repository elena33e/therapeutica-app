<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Înregistrare - Therapeutica</title>
</head>
<body>
<div layout:fragment="content" class="container mx-auto px-4 py-12 flex items-center justify-center min-h-[75vh]">

    <!-- Card Înregistrare -->
    <div class="w-full max-w-md bg-white p-10 rounded-3xl shadow-sm border border-gray-200">

        <div class="text-center mb-10">
            <!-- Element grafic de ancorare -->
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-50 border border-gray-200 mb-6 shadow-sm">
                <i class="fas fa-user-check text-2xl text-brand-teal"></i>
            </div>
            <h1 class="text-3xl font-black text-brand-navy tracking-tight">Înregistrare</h1>
            <p class="text-gray-500 mt-3 font-medium">Introdu datele pentru a te putea înregistra</p>
        </div>

        <form id="inregistrareForm" class="space-y-6">
            <!-- Cod Înregistrare -->
            <div>
                <label for="codUnic" class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Cod Înregistrare</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-brand-blue">
                        <i class="fas fa-key"></i>
                    </span>
                    <input type="text" id="codUnic" name="codUnic" required
                           class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-all font-bold text-brand-navy bg-gray-50 focus:bg-white"
                           placeholder="Introdu codul primit">
                </div>
            </div>

            <!-- CNP -->
            <div>
                <label for="cnp" class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">CNP</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-brand-blue">
                        <i class="far fa-id-card"></i>
                    </span>
                    <input type="text" id="cnp" name="cnp" required
                           class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-all font-bold text-brand-navy bg-gray-50 focus:bg-white"
                           placeholder="Introdu CNP-ul tău">
                </div>
            </div>

            <!-- Parolă -->
            <div>
                <label for="parola" class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Parolă Nouă</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-brand-blue">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="parola" name="parola" required
                           class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-all font-bold text-brand-navy bg-gray-50 focus:bg-white"
                           placeholder="••••••••">
                </div>
                <p class="text-[10px] font-bold text-gray-400 mt-2"><i class="fas fa-info-circle mr-1"></i> Minimum 8 caractere, o cifră și un caracter special</p>
            </div>

            <!-- Confirmă Parola -->
            <div>
                <label for="confirmaParola" class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Confirmă Parolă</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-brand-blue">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="confirmaParola" name="confirmaParola" required
                           class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-all font-bold text-brand-navy bg-gray-50 focus:bg-white"
                           placeholder="••••••••">
                </div>
            </div>

            <!-- Mesaj de eroare/succes -->
            <div id="message" class="hidden"></div>

            <!-- Buton Principal Navy -->
            <button type="submit"
                    class="w-full bg-brand-navy hover:bg-brand-navy/90 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-all flex items-center justify-center group mt-4">
                <span class="uppercase tracking-widest text-xs">Activează Cont</span>
                <i class="fas fa-arrow-right ml-2 text-[10px] group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-gray-100 text-center text-sm">
            <p class="text-gray-500 font-medium">Ai deja cont activ?
                <a th:href="@{/login}" class="text-brand-teal font-bold hover:text-brand-navy transition-colors ml-1">Autentifică-te aici</a>
            </p>
            <div class="mt-6">
                <a th:href="@{/}" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest hover:text-brand-navy transition-colors flex items-center justify-center">
                    <i class="fas fa-arrow-left mr-2"></i> Înapoi la pagina principală
                </a>
            </div>
        </div>
    </div>
</div>

<div layout:fragment="scripts">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log("=== DOM LOADED ===");

            const form = document.getElementById('inregistrareForm');
            const messageDiv = document.getElementById('message');

            function isParolaValida(parola) {
                const hasMinLength = parola.length >= 8;
                const hasNumber = /[0-9]/.test(parola);
                const hasSpecialChar = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(parola);
                return hasMinLength && hasNumber && hasSpecialChar;
            }

            // Funcția de afișare mesaje actualizată cu designul Therapeutica
            function showMessage(text, type) {
                if (messageDiv) {
                    messageDiv.className = 'mb-6 p-4 text-sm font-bold rounded-xl flex items-center shadow-sm';

                    if (type === 'success') {
                        messageDiv.innerHTML = `<i class="fas fa-check-circle mr-3 text-lg"></i><span>${text}</span>`;
                        messageDiv.classList.add('bg-brand-teal', 'text-white');
                    } else {
                        messageDiv.innerHTML = `<i class="fas fa-exclamation-triangle mr-3 text-red-500 text-lg"></i><span>${text}</span>`;
                        messageDiv.classList.add('bg-red-50', 'border', 'border-red-200', 'text-red-700');
                    }

                    messageDiv.classList.remove('hidden');
                }
            }

            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    console.log("=== FORM SUBMITTED ===");

                    const codUnic = document.getElementById('codUnic').value.trim();
                    const cnp = document.getElementById('cnp').value.trim();
                    const parola = document.getElementById('parola').value;
                    const confirmaParola = document.getElementById('confirmaParola').value;

                    if (!codUnic || !cnp || !parola || !confirmaParola) {
                        showMessage('Toate câmpurile sunt obligatorii', 'error');
                        return;
                    }

                    if (parola !== confirmaParola) {
                        showMessage('Parolele nu coincid', 'error');
                        return;
                    }

                    if (!isParolaValida(parola)) {
                        showMessage('Parola trebuie să aibă cel puțin 8 caractere, o cifră și un caracter special', 'error');
                        return;
                    }

                    try {
                        const response = await fetch('/api/auth/inregistrare', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                codUnic,
                                cnp,
                                parola,
                                confirmaParola
                            })
                        });

                        const data = await response.json();

                        if (data.success) {
                            showMessage('Cont activat cu succes! Te redirecționăm...', 'success');
                            setTimeout(() => {
                                window.location.href = '/login';
                            }, 2000);
                        } else {
                            showMessage(data.message || 'Eroare la înregistrare', 'error');
                        }
                    } catch (error) {
                        console.error("Fetch error:", error);
                        showMessage('Eroare de conexiune: ' + error.message, 'error');
                    }
                });
            }
        });
    </script>
</div>
</body>
</html>
