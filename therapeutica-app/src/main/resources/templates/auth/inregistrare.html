<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Înregistrare - Therapeutica</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6">Activează Cont</h1>

        <form id="inregistrareForm">
            <!-- Cod Înregistrare -->
            <div class="mb-4">
                <label for="codUnic" class="block text-gray-700 mb-2">Cod Înregistrare:</label>
                <input type="text" id="codUnic" name="codUnic" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Introdu codul primit">
            </div>

            <!-- CNP -->
            <div class="mb-4">
                <label for="cnp" class="block text-gray-700 mb-2">CNP:</label>
                <input type="text" id="cnp" name="cnp" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Introdu CNP-ul tău">
            </div>

            <!-- Parolă -->
            <div class="mb-4">
                <label for="parola" class="block text-gray-700 mb-2">Parolă Nouă:</label>
                <input type="password" id="parola" name="parola" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Minimum 8 caractere, cifră și caracter special">
                <p class="text-xs text-gray-500 mt-1">Parola trebuie să conțină cel puțin 8 caractere, o cifră și un caracter special</p>
            </div>

            <!-- Confirmă Parola -->
            <div class="mb-6">
                <label for="confirmaParola" class="block text-gray-700 mb-2">Confirmă Parolă:</label>
                <input type="password" id="confirmaParola" name="confirmaParola" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Reintrodu parola">
            </div>

            <!-- Mesaj de eroare/succes -->
            <div id="message" class="mb-4 p-3 rounded hidden"></div>

            <button type="submit"
                    class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                Activează Cont
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-600">Ai deja cont activ?
                <a th:href="@{/login}" class="text-blue-500 hover:underline font-medium">Autentifică-te aici</a>
            </p>
            <p class="mt-2">
                <a th:href="@{/}" class="text-gray-500 hover:underline">← Înapoi la pagina principală</a>
            </p>
        </div>
    </div>
</div>

<div layout:fragment="scripts">
    <script>

    document.addEventListener('DOMContentLoaded', function() {
        console.log("=== DOM LOADED ===");

        // Folosește Thymeleaf pentru a selecta elementele
        const form = document.getElementById('inregistrareForm');
        const messageDiv = document.getElementById('message');

        console.log("Form found:", !!form);
        console.log("Message div found:", !!messageDiv);

        function isParolaValida(parola) {
            const hasMinLength = parola.length >= 8;
            const hasNumber = /[0-9]/.test(parola);
            const hasSpecialChar = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(parola);
            return hasMinLength && hasNumber && hasSpecialChar;
        }

        function showMessage(text, type) {
            if (messageDiv) {
                messageDiv.textContent = text;
                messageDiv.className = 'mb-4 p-3 rounded';

                if (type === 'success') {
                    messageDiv.classList.add('bg-green-100', 'border', 'border-green-400', 'text-green-700');
                } else {
                    messageDiv.classList.add('bg-red-100', 'border', 'border-red-400', 'text-red-700');
                }

                messageDiv.classList.remove('hidden');
            }
        }

        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log("=== FORM SUBMITTED ===");

                // Folosește Thymeleaf pentru a selecta input-urile
                const codUnic = document.getElementById('codUnic').value.trim();
                const cnp = document.getElementById('cnp').value.trim();
                const parola = document.getElementById('parola').value;
                const confirmaParola = document.getElementById('confirmaParola').value;

                console.log("Form data:", { codUnic, cnp, parola, confirmaParola });

                // Validări
                if (!codUnic || !cnp || !parola || !confirmaParola) {
                    showMessage('Toate câmpurile sunt obligatorii', 'error');
                    return;
                }

                if (parola !== confirmaParola) {
                    showMessage('Parolele nu coincid', 'error');
                    return;
                }

                if (!isParolaValida(parola)) {
                    showMessage('Parola trebuie să aibă cel puțin 8 caractere, o cifră și un caracter special', 'error');
                    return;
                }

                try {
                    console.log("Sending request to API...");
                    const response = await fetch('/api/auth/inregistrare', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            codUnic,
                            cnp,
                            parola,
                            confirmaParola
                        })
                    });

                    const data = await response.json();
                    console.log("API response:", data);

                    if (data.success) {
                        showMessage('Cont activat cu succes! Te redirecționăm...', 'success');
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        showMessage(data.message || 'Eroare la înregistrare', 'error');
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                    showMessage('Eroare de conexiune: ' + error.message, 'error');
                }
            });
        } else {
            console.error("Form not found!");
        }
    });
</script>
</div>>
</body>
</html>
