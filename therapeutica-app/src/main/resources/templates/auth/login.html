<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Autentificare - Therapeutica</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Autentificare</h1>
            <p class="text-gray-500 mt-2">Introduceți datele pentru a accesa platforma</p>
        </div>

        <div th:if="${param.error}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded">
            <div class="flex items-center">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span>Email sau parolă incorecte. Vă rugăm să încercați din nou.</span>
            </div>
        </div>

        <div th:if="${param.logout}" class="mb-6 p-4 bg-green-50 border-l-4 border-green-500 text-green-700 text-sm rounded">
            <div class="flex items-center">
                <i class="fas fa-check-circle mr-2"></i>
                <span>V-ați deconectat cu succes.</span>
            </div>
        </div>

        <form th:action="@{/process-login}" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Adresă Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" id="username" name="username" required
                           class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                           placeholder="nume@exemplu.com">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="block text-sm font-medium text-gray-700">Parolă</label>
                    <a href="#" class="text-xs text-green-600 hover:underline">Ați uitat parola?</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" name="password" required
                           class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition duration-200 transform active:scale-95">
                Autentifică-te
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center text-sm">
            <p class="text-gray-600">
                Nu aveți un cont creat?
                <a th:href="@{/api/auth/inregistrare}" class="text-green-600 font-semibold hover:text-green-800 underline-offset-4 hover:underline">
                    Înregistrați-vă acum
                </a>
            </p>
            <div class="mt-4">
                <a th:href="@{/}" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-arrow-left mr-1"></i> Înapoi la pagina principală
                </a>
            </div>
        </div>
    </div>
</div>

<div layout:fragment="scripts">
    <script>
        // Păstrăm doar o mică logică pentru a prelua email-ul din URL dacă userul tocmai s-a înregistrat
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const registeredEmail = urlParams.get('email');
            if (registeredEmail) {
                document.getElementById('username').value = registeredEmail;
            }
        });
    </script>
</div>
</body>
</html>
