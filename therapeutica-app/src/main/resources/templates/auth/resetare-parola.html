<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Recuperare Parolă - Therapeutica</title>
</head>
<body>
<div layout:fragment="content" class="container mx-auto px-4 py-12 flex items-center justify-center min-h-[75vh]">

    <div class="w-full max-w-md bg-white p-10 rounded-3xl shadow-sm border border-gray-200">

        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-50 border border-gray-200 mb-6 shadow-sm">
                <i class="fas fa-envelope-open-text text-2xl text-brand-teal"></i>
            </div>
            <h1 class="text-3xl font-black text-brand-navy tracking-tight">Recuperare parolă</h1>
            <p class="text-gray-500 mt-3 font-medium">Introduceți adresa de email pentru a primi link-ul de resetare</p>
        </div>

        <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl text-xs font-bold text-center">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span th:text="${error}">Eroare</span>
        </div>

        <div th:if="${message}" class="mb-6 p-4 bg-teal-50 border border-teal-200 text-teal-700 rounded-xl text-xs font-bold text-center">
            <i class="fas fa-check-circle mr-2"></i>
            <span th:text="${message}">Succes</span>
        </div>

        <form th:action="@{/resetare-parola/cere-resetare}" method="POST" class="space-y-6">
            <div>
                <label for="email" class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Adresă Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-brand-blue">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" id="email" name="email" required th:value="${param.email}"
                           class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition-all font-bold text-brand-navy bg-gray-50 focus:bg-white"
                           placeholder="nume@exemplu.com">
                </div>
            </div>

            <button type="submit"
                    class="w-full bg-brand-navy hover:bg-brand-navy/90 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-all flex items-center justify-center group mt-2">
                <span class="uppercase tracking-widest text-xs">Trimite link-ul</span>
                <i class="fas fa-paper-plane ml-2 text-[10px] group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-gray-100 text-center text-sm">
            <div class="mt-2">
                <a th:href="@{/login}" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest hover:text-brand-navy transition-colors flex items-center justify-center">
                    <i class="fas fa-arrow-left mr-2"></i> Înapoi la autentificare
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
