<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Pacienții mei - Therapeutica</title>
</head>
<body>

<div layout:fragment="content" class="container mx-auto px-4 py-8">
    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Pacienții mei</h1>
        <p class="text-gray-600 mt-2">Lista pacienților asociați dumneavoastră</p>
    </div>

    <!-- Mesaje flash -->
    <div th:if="${success}" class="mb-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg">
        <i class="fas fa-check-circle mr-2"></i>
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- Lista pacienți -->
    <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
            <h2 class="text-xl font-semibold text-gray-700">
                <i class="fas fa-users mr-2"></i>
                Pacienții asociați
                <span class="ml-2 text-sm font-normal text-gray-500"
                      th:text="'(' + ${pacienti.size()} + ' pacienți)'">
                </span>
            </h2>
        </div>

        <div th:if="${pacienti != null and !pacienti.isEmpty()}"
             class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Pacient
                    </th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Contact
                    </th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        CNP
                    </th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Acțiuni
                    </th>
                </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="pacient : ${pacienti}">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 h-10 w-10 bg-blue-100 rounded-full flex items-center justify-center">
                                <i class="fas fa-user-injured text-blue-600"></i>
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">
                                    <span th:text="${pacient.user.nume}"></span>
                                    <span th:text="${pacient.user.prenume}"></span>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900" th:text="${pacient.user.email}"></div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <span th:text="${pacient.cnp} ?: '-'"></span>
                    </td>

                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <a th:href="@{'/medic/' + ${medicId} + '/pacient/' + ${pacient.pacientId}}"
                           class="text-blue-600 hover:text-blue-900 mr-4">
                            <i class="fas fa-eye mr-1"></i>Vezi detalii
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Mesaj dacă nu există pacienți -->
        <div th:if="${pacienti == null or pacienti.isEmpty()}"
             class="text-center py-12">
            <div class="mx-auto w-24 h-24 mb-6 text-gray-300">
                <i class="fas fa-user-slash text-6xl"></i>
            </div>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">
                Nu aveți pacienți asociați
            </h3>
            <p class="text-gray-600 mb-6 max-w-md mx-auto">
                Pentru a putea atribui chestionare, trebuie să aveți pacienți asociați.
            </p>
        </div>
    </div>
</div>

</body>
</html>
