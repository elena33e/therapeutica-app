<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Acasă | Therapeutica</title>
</head>
<body>
<div layout:fragment="content" class="relative min-h-[calc(100vh-80px)] w-full flex items-center overflow-hidden bg-gray-50">

    <div class="hidden lg:block absolute top-0 right-0 w-[55%] h-full bg-brand-teal z-0"
         style="clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%);"></div>

    <div class="container mx-auto px-4 relative z-10 py-12 lg:py-20 flex flex-col lg:flex-row items-center justify-between gap-12 lg:gap-8">


        <div class="w-full lg:w-1/2 text-left space-y-8">
            <div class="w-16 h-1.5 bg-brand-gold rounded-full"></div>

            <div class="space-y-4">
                <h1 class="text-4xl md:text-5xl lg:text-6xl font-black text-brand-navy leading-[1.15] tracking-tight">
                    Bine ai venit la Therapeutica
                </h1>
                <p class="text-lg text-gray-600 leading-relaxed max-w-xl">
                    Descoperă o modalitate modernă și simplă de a avea grijă de sănătatea ta. Îți organizăm istoricul medical într-un singur loc și facem legătura între cifrele din analize și starea ta de bine, oferindu-i medicului tău claritatea de care are nevoie.
                </p>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-4 pt-4">
                <a th:href="@{/login}" class="px-8 py-3.5 bg-brand-navy hover:opacity-90 text-white text-sm font-bold rounded-full shadow-lg shadow-brand-navy/30 transition-transform transform hover:-translate-y-0.5 w-full sm:w-auto text-center uppercase tracking-wider">
                    Începe Acum
                </a>
            </div>
        </div>

        <div class="w-full lg:w-[45%] relative flex justify-center items-center h-[400px] lg:h-[500px]">

            <div class="absolute inset-0 bg-brand-navy/5 rounded-full blur-3xl transform scale-90"></div>

            <div class="relative w-64 md:w-80 h-48 md:h-60 bg-white rounded-2xl shadow-2xl border border-gray-100 flex flex-col overflow-hidden z-10 transform lg:-rotate-3 transition-transform hover:rotate-0 duration-500">
                <div class="h-6 bg-gray-50 border-b border-gray-100 flex items-center px-3 gap-1.5 w-full">
                    <div class="w-2.5 h-2.5 rounded-full bg-brand-gold"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-brand-blue"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-brand-navy/30"></div>
                </div>
                <div class="flex-1 bg-white relative flex items-center justify-center p-6">
                    <i class="fas fa-file-medical-alt text-7xl text-brand-navy/5 absolute"></i>
                    <div class="w-full space-y-3 z-10">
                        <div class="w-3/4 h-3 bg-gray-100 rounded-full"></div>
                        <div class="w-1/2 h-3 bg-gray-100 rounded-full"></div>
                        <div class="w-5/6 h-3 bg-gray-50 rounded-full mt-6"></div>
                    </div>
                </div>
            </div>

            <div class="absolute top-[60%] md:top-[65%] w-72 md:w-96 h-4 bg-brand-navy/10 rounded-b-3xl shadow-xl z-10 transform lg:-rotate-3 backdrop-blur-sm"></div>

            <div class="absolute top-8 left-0 lg:-left-12 bg-white p-4 rounded-2xl shadow-xl flex items-center gap-3 z-20 animate-[bounce_3s_infinite_ease-in-out]">
                <div class="w-12 h-12 rounded-full bg-brand-navy/5 flex items-center justify-center text-brand-navy shadow-inner border border-brand-navy/10">
                    <i class="fas fa-user-md text-xl"></i>
                </div>
                <div>
                    <div class="w-16 h-2 bg-gray-200 rounded-full mb-2"></div>
                    <div class="w-10 h-2 bg-gray-100 rounded-full"></div>
                </div>
            </div>

            <div class="absolute top-1/3 -right-4 lg:-right-8 bg-brand-navy p-3.5 rounded-full shadow-lg shadow-brand-navy/30 text-white z-20 animate-[bounce_4s_infinite_ease-in-out_0.5s]">
                <i class="fas fa-heartbeat text-xl"></i>
            </div>

            <div class="absolute bottom-10 left-8 lg:left-0 bg-white p-4 rounded-2xl shadow-xl flex items-center gap-3 z-20 animate-[bounce_3.5s_infinite_ease-in-out_1s]">
                <div class="w-12 h-12 rounded-full bg-brand-blue/10 flex items-center justify-center text-brand-blue shadow-inner border border-brand-blue/20">
                    <i class="fas fa-pills text-xl"></i>
                </div>
                <div>
                    <div class="w-12 h-2 bg-gray-200 rounded-full mb-2"></div>
                    <div class="w-20 h-2 bg-gray-100 rounded-full"></div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
