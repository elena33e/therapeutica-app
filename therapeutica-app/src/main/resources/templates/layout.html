<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE">Therapeutica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script th:src="@{/js/tailwind-config.js}"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

<header th:replace="~{fragments/header :: header}"></header>

<div class="flex flex-1 relative">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div th:class="${session != null and session.userId != null} ?
                        'flex flex-col flex-1 w-full ml-0 md:ml-64 min-h-[calc(100vh-4rem)]' :
                        'flex flex-col flex-1 w-full min-h-[calc(100vh-4rem)]'">

        <main class="flex-1 flex flex-col">
            <div layout:fragment="content" class="flex-1"></div>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

</body>
</html>
