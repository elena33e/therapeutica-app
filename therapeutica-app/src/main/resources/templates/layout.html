<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE">Therapeutica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script th:src="@{/js/tailwind-config.js}"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

<header th:replace="~{fragments/header :: header}"></header>

<!-- Div-ul ăsta ține sidebar-ul la stânga și conținutul la dreapta -->
<div class="flex flex-1 overflow-hidden">

    <!-- Sidebar-ul tău -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!--
      AICI ESTE SECRETUL: flex flex-col flex-1 min-h-full.
      Coloana din dreapta va lua tot spațiul rămas, iar în interiorul ei vom împinge flex.
    -->
    <div th:class="${session != null and session.userId != null} ? 'flex flex-col flex-1 w-full ml-0 md:ml-64 min-h-[calc(100vh-4rem)]' : 'flex flex-col flex-1 min-h-screen w-full'">

        <!-- Main-ul cu flex-1 va absorbi ABSOLUT TOT spațiul gol, împingând footerul jos de tot -->
        <main layout:fragment="content" class="flex-1 w-full flex flex-col">
        </main>

        <!-- Footer-ul e forțat să stea la final -->
        <footer th:replace="~{fragments/footer :: footer}"></footer>

    </div>
</div>

<div layout:fragment="scripts"></div>

</body>
</html>
